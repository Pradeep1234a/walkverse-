name: Build and Release Android APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'task.md'
      - 'implementation_plan.md'
      - 'walkthrough.md'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Auto-increment Version Code & Name
        id: version_bump
        run: |
          python -c "
          import re
          import os

          # Read app/build.gradle.kts
          with open('app/build.gradle.kts', 'r') as f:
              content = f.read()
              
          # Find and increment versionCode
          code_match = re.search(r'versionCode\s*=\s*(\d+)', content)
          if not code_match:
              raise ValueError('Could not find versionCode in app/build.gradle.kts')
          current_code = int(code_match.group(1))
          new_code = current_code + 1
          content = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {new_code}', content)
          
          # Find and increment patch version in versionName (e.g. 1.0.0 -> 1.0.1)
          name_match = re.search(r'versionName\s*=\s*\"([\d\.]+)\"', content)
          if not name_match:
              raise ValueError('Could not find versionName in app/build.gradle.kts')
          current_name = name_match.group(1)
          parts = current_name.split('.')
          if len(parts) >= 3:
              parts[2] = str(int(parts[2]) + 1)
          elif len(parts) == 2:
              parts.append('1')
          else:
              parts = ['1', '0', '0']
          new_name = '.'.join(parts)
          content = re.sub(r'versionName\s*=\s*\"[\d\.]+\"', f'versionName = \"{new_name}\"', content)
          
          with open('app/build.gradle.kts', 'w') as f:
              f.write(content)
              
          # Write outputs for GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'VERSION_CODE={new_code}\n')
              out.write(f'VERSION_NAME={new_name}\n')
          
          print(f'Bumped Version Code to: {new_code}')
          print(f'Bumped Version Name to: {new_name}')
          "

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Find and Rename APK
        id: apk_info
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Could not find built APK"
            exit 1
          fi
          NEW_APK_NAME="LiquidCalc-v${{ steps.version_bump.outputs.VERSION_NAME }}.apk"
          mv "$APK_PATH" "app/build/outputs/apk/release/$NEW_APK_NAME"
          echo "APK_FILE=app/build/outputs/apk/release/$NEW_APK_NAME" >> $GITHUB_OUTPUT
          echo "APK_NAME=$NEW_APK_NAME" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts

          # If there are no staged changes, skip commit/push to avoid failure
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bump version to v${{ steps.version_bump.outputs.VERSION_NAME }} [skip ci]"
            git push origin main
          fi

      - name: Create Git Tag
        run: |
          TAG="v${{ steps.version_bump.outputs.VERSION_NAME }}"

          # Check if tag exists on remote; if so, skip creating it
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on remote — skipping tag creation."
          else
            # Create and push tag
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_bump.outputs.VERSION_NAME }}
          name: Release v${{ steps.version_bump.outputs.VERSION_NAME }}
          body: |
            ## LiquidCalc Release v${{ steps.version_bump.outputs.VERSION_NAME }}
            
            This is an automated release of the iOS 26 Liquid Glass Calculator app.
            
            ### Changes:
            - Auto-incremented build code: **${{ steps.version_bump.outputs.VERSION_CODE }}**
            - Complete glassmorphism style assets, custom moving gradients, and offline math evaluation support.
            
            ### Assets:
            - **Download Installable APK**: [`${{ steps.apk_info.outputs.APK_NAME }}`]
          draft: false
          prerelease: false
          files: ${{ steps.apk_info.outputs.APK_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
