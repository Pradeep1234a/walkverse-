name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build & Release signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Auto-increment Version Code & Name
        id: version_bump
        run: |
          GRADLE_FILE="app/build.gradle.kts"
          
          # Read current version code and name
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' $GRADLE_FILE)
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[0-9\.]+' $GRADLE_FILE)
          
          # Increment code and name (e.g. 200 -> 201; 2.0.0 -> 2.0.1)
          NEW_CODE=$((VERSION_CODE + 1))
          IFS='.' read -r major minor patch <<< "$VERSION_NAME"
          NEW_PATCH=$((patch + 1))
          NEW_NAME="$major.$minor.$NEW_PATCH"
          
          # Write back to build.gradle.kts
          sed -i "s/versionCode = $VERSION_CODE/versionCode = $NEW_CODE/g" $GRADLE_FILE
          sed -i "s/versionName = \"$VERSION_NAME\"/versionName = \"$NEW_NAME\"/g" $GRADLE_FILE
          
          echo "NEW_VERSION=v$NEW_NAME" >> $GITHUB_OUTPUT
          echo "NEW_CODE=$NEW_CODE" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bump version to ${{ steps.version_bump.outputs.NEW_VERSION }} [skip ci]"
            git push origin main
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename compiled APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/LiquidCalc-${{ steps.version_bump.outputs.NEW_VERSION }}.apk

      - name: Create Git Tag
        id: create_tag
        run: |
          TAG_NAME="${{ steps.version_bump.outputs.NEW_VERSION }}"
          # Check if tag already exists in remote
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists, skipping tag creation."
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.create_tag.outputs.SKIP != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_bump.outputs.NEW_VERSION }}
          name: Release ${{ steps.version_bump.outputs.NEW_VERSION }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/LiquidCalc-${{ steps.version_bump.outputs.NEW_VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
