name: Build and Release WalkVerse APKs

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'task.md'
      - 'implementation_plan.md'
      - 'walkthrough.md'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python (For Version Bump)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Auto-increment Version Code
        id: version_bump
        run: |
          python -c "
          import re
          
          # Read app/build.gradle.kts
          with open('app/build.gradle.kts', 'r') as f:
              content = f.read()
              
          # Find and increment versionCode
          code_match = re.search(r'versionCode = (\d+)', content)
          if not code_match:
              raise ValueError('Could not find versionCode in app/build.gradle.kts')
          current_code = int(code_match.group(1))
          new_code = current_code + 1
          content = re.sub(r'versionCode = \d+', f'versionCode = {new_code}', content)
          
          # Find and increment patch version in versionName (e.g. 1.0.0 -> 1.0.1)
          name_match = re.search(r'versionName = \"([^\"]+)\"', content)
          if not name_match:
              raise ValueError('Could not find versionName in app/build.gradle.kts')
          current_name = name_match.group(1)
          parts = current_name.split('.')
          if len(parts) >= 3:
              parts[2] = str(int(parts[2]) + 1)
          else:
              parts.append('1')
          new_name = '.'.join(parts)
          content = re.sub(r'versionName = \"[^\"]+\"', f'versionName = \"{new_name}\"', content)
          
          # Write back to file
          with open('app/build.gradle.kts', 'w') as f:
              f.write(content)
              
          print(f'Successfully incremented version to Code: {new_code}, Name: {new_name}')
          "
          # Set output parameters
          python -c "
          import re, os
          with open('app/build.gradle.kts', 'r') as f:
              content = f.read()
          code = re.search(r'versionCode = (\d+)', content).group(1)
          name = re.search(r'versionName = \"([^\"]+)\"', content).group(1)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
              go.write(f'VERSION_CODE={code}\n')
              go.write(f'VERSION_NAME={name}\n')
          "

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version_bump.outputs.VERSION_NAME }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug & Release APKs
        run: ./gradlew assembleDebug assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Locate, Rename, and Output APKs
        id: apk_info
        run: |
          # Find normal/debug APK
          DEBUG_APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          # Find release APK
          RELEASE_APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          if [ -z "$DEBUG_APK_PATH" ] || [ -z "$RELEASE_APK_PATH" ]; then
            echo "Error: Could not find built APKs"
            exit 1
          fi
          
          NEW_DEBUG_NAME="WalkVerse-v${{ steps.version_bump.outputs.VERSION_NAME }}-debug.apk"
          NEW_RELEASE_NAME="WalkVerse-v${{ steps.version_bump.outputs.VERSION_NAME }}-release.apk"
          
          mv "$DEBUG_APK_PATH" "app/build/outputs/apk/debug/$NEW_DEBUG_NAME"
          mv "$RELEASE_APK_PATH" "app/build/outputs/apk/release/$NEW_RELEASE_NAME"
          
          echo "DEBUG_APK=app/build/outputs/apk/debug/$NEW_DEBUG_NAME" >> $GITHUB_OUTPUT
          echo "RELEASE_APK=app/build/outputs/apk/release/$NEW_RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "DEBUG_NAME=$NEW_DEBUG_NAME" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$NEW_RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git tag v${{ steps.version_bump.outputs.VERSION_NAME }}
          git push origin v${{ steps.version_bump.outputs.VERSION_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_bump.outputs.VERSION_NAME }}
          name: Release v${{ steps.version_bump.outputs.VERSION_NAME }}
          body: |
            ## WalkVerse AI Release v${{ steps.version_bump.outputs.VERSION_NAME }}
            
            This is an automated production release for WalkVerse AI.
            
            ### Package version:
            - **Version Code**: `${{ steps.version_bump.outputs.VERSION_CODE }}`
            - **Version Name**: `${{ steps.version_bump.outputs.VERSION_NAME }}`
            
            ### Assets:
            - **Download normal (debug) APK**: [`${{ steps.apk_info.outputs.DEBUG_NAME }}`]
            - **Download release APK**: [`${{ steps.apk_info.outputs.RELEASE_NAME }}`]
          draft: false
          prerelease: false
          files: |
            ${{ steps.apk_info.outputs.DEBUG_APK }}
            ${{ steps.apk_info.outputs.RELEASE_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
